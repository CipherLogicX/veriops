resolver 127.0.0.11 valid=10s ipv6=off;

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/trackqa.crt;
    ssl_certificate_key /etc/nginx/ssl/trackqa.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "DENY" always;
    add_header X-Content-Type-Options     "nosniff" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;
    add_header X-XSS-Protection           "1; mode=block" always;

    client_max_body_size 25M;

    # Login rate limit
    location = /api/v1/auth/login {
        limit_req zone=login_zone burst=5 nodelay;
        limit_req_status 429;
        set $backend backend:8000;
        proxy_pass http://$backend;
        include /etc/nginx/conf.d/proxy_params.inc;
    }

    # API
    location /api/ {
        limit_req zone=api_zone burst=200 nodelay;
        limit_req_status 429;
        set $backend backend:8000;
        proxy_pass http://$backend;
        include /etc/nginx/conf.d/proxy_params.inc;
    }

    # Health endpoints (no rate limit) - /health, /ready, /api/health, /api/ready
    location ~ ^/(health|ready|api/health|api/ready|api/v1/health|api/v1/ready)$ {
        set $backend backend:8000;
        proxy_pass http://$backend;
        access_log off;
        include /etc/nginx/conf.d/proxy_params.inc;
    }

    # Frontend SPA
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
